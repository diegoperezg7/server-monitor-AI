services:
  server-monitor:
    image: server-monitor:latest
    build: .
    container_name: server-monitor
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    env_file:
      - .env
    environment:
      - NETDATA_URL=http://host.docker.internal:19999
      - CROWDSEC_URL=http://host.docker.internal:8081
      - NET_INTERFACE=en0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - HEALTHCHECK_PING_URL=${HEALTHCHECK_PING_URL}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - DASHBOARD_URL=${DASHBOARD_URL}
      - DOCKER_HOST=http://docker-proxy:2375
      - AUTO_RESTORE_ON_BOOT=true
      - RESTORE_STATE_FILE=/data/active-services-state.json
      - RESTORE_STARTUP_DELAY_MS=15000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
    networks:
      - default
      - docker_proxy

networks:
  docker_proxy:
    external: true
